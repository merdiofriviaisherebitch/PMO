name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # Placeholder PUBLIC env so `next build` is hermetic — never put real
      # secrets in CI. Real values are injected by Vercel/Supabase at deploy
      # time. The service-role key is intentionally absent: service.ts reads it
      # lazily and must never run in the build (CLAUDE.md §14).
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test:run

      - name: Build
        run: bun run build

  rls-isolation:
    name: RLS Isolation (pen-test + exhaustive regression)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations + seed (db reset)
        run: supabase db reset

      - name: RLS isolation pen-test (CLAUDE.md §15 — the non-negotiable gate)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/rls_pentest.sql

      - name: Exhaustive RLS regression (RLS enabled + a policy + cross-dept zero-read)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/rls_regression.sql

      - name: Escalation engine suite (idempotency · ladder · backoff)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/escalation_test.sql

      - name: Dependencies suite (cross-dept edge model · blocked escalation)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/dependencies_test.sql

      - name: Setup Bun (report-scope smoke)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture local Supabase keys
        run: |
          supabase status -o env \
            | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=' \
            | sed 's/"//g' >> "$GITHUB_ENV"

      - name: Report-scope service-role smoke (§15 item 9 — no cross-dept leak)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.API_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
        run: |
          out="$(bun --conditions react-server supabase/tests/report_scope_smoke.ts)"
          echo "$out"
          echo "$out" | grep -q SMOKE_OK

      - name: Setup Deno (edge function tests)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge function unit tests (Notifier port)
        run: deno test --allow-all supabase/functions/escalation-sender/

      - name: Stop stack
        if: always()
        run: supabase stop
